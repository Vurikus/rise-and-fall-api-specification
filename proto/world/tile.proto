syntax = "proto3";

package proto.world;

option java_multiple_files = true;
option java_outer_classname = "TileProtoOuter";

import "proto/world/terrain_type.proto";
import "proto/world/relief_type.proto";
import "proto/world/tile_key.proto";

message TileProto {
  proto.world.TileKeyProto key = 2;
  proto.world.ReliefTypeProto mt1Relief = 3;
  proto.world.ReliefTypeProto mt2Relief = 4;
  proto.world.ReliefTypeProto mt3Relief = 5;
  proto.world.TerrainTypeProto terrainType = 6;
}