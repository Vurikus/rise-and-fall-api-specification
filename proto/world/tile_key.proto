syntax = "proto3";

package proto.world;

option java_multiple_files = true;
option java_outer_classname = "TileKeyProto";

import "proto/common/api_vector3.proto";

message TileKey {
  string id = 1;
  float xNormal = 2;
  float yNormal = 3;
  float zNormal = 4;
  repeated string neighbor_ids = 5;
}